root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/karr"
  cmd = "go build -o ./tmp/karr ./cmd/karr"
  delay = 1000
  exclude_dir = ["tmp", "web", "node_modules", "vendor", ".git"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "sql", "yaml", "yml"]
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = true
  args_bin = ["serve"]

[log]
  time = false

[misc]
  clean_on_exit = true
