services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: karr
      POSTGRES_USER: karr
      POSTGRES_PASSWORD: karr-dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karr"]
      interval: 5s
      timeout: 5s
      retries: 5

  karr:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://karr:karr-dev@postgres:5432/karr?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
