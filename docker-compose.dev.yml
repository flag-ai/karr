# Development overrides — use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  karr:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-karr}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-karr}?sslmode=disable
      KARR_DEFAULT_AGENT_URL: ${KARR_DEFAULT_AGENT_URL:-}
      KARR_DEFAULT_AGENT_TOKEN: ${KARR_DEFAULT_AGENT_TOKEN:-}
      KARR_CORS_ORIGINS: ${KARR_CORS_ORIGINS:-http://localhost:5173}

volumes:
  go-mod-cache:
